name: Quality Gates

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "frontend/**"
      - "backend/Dockerfile"
      - "frontend/Dockerfile"
      - "docker-compose.yml"
      - ".github/workflows/quality-gates.yml"
  pull_request:
    branches:
      - main
    paths:
      - "backend/**"
      - "frontend/**"
      - "backend/Dockerfile"
      - "frontend/Dockerfile"
      - "docker-compose.yml"
      - ".github/workflows/quality-gates.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read
  security-events: write

jobs:
  ci-base:
    name: CI Base
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Backend code quality status
        run: echo "No backend lint script detected in backend/package.json; backend lint is currently not enforced."

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  osv-scan:
    name: OSV Dependency Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3

      - name: Run OSV report scan
        uses: google/osv-scanner-action@v2.3.8
        with:
          scan-args: |-
            --recursive
            --format json
            --output osv-results.json
            ./

      - name: Run OSV blocking scan
        uses: google/osv-scanner-action@v2.3.8
        with:
          scan-args: |-
            --recursive
            ./

      - name: Upload OSV artifact
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: osv-results
          path: osv-results.json
          if-no-files-found: ignore

  gitleaks-scan:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3

      - name: Run Gitleaks scan
        uses: gitleaks/gitleaks-action@v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: detect --source . --redact --report-format sarif --report-path gitleaks.sarif --exit-code 1

      - name: Upload Gitleaks SARIF
        if: always() && github.repository_visibility == 'public'
        uses: github/codeql-action/upload-sarif@v4.33.0
        with:
          sarif_file: gitleaks.sarif

      - name: Upload Gitleaks artifact
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: gitleaks-results
          path: gitleaks.sarif
          if-no-files-found: ignore

  sca-trivy-scan:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3

      - name: Run Trivy filesystem report scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,license
          severity: LOW,MEDIUM,HIGH,CRITICAL
          ignore-unfixed: false
          format: sarif
          output: trivy-fs-all.sarif
          exit-code: 0

      - name: Run Trivy filesystem blocking gate
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,license
          severity: HIGH,CRITICAL
          ignore-unfixed: false
          format: sarif
          output: trivy-fs-blocking.sarif
          exit-code: 1

      - name: Upload Trivy SARIF
        if: always() && github.repository_visibility == 'public'
        uses: github/codeql-action/upload-sarif@v4.33.0
        with:
          sarif_file: trivy-fs-all.sarif

      - name: Upload Trivy artifact
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: trivy-results
          path: |
            trivy-fs-all.sarif
            trivy-fs-blocking.sarif
          if-no-files-found: ignore

  hadolint-scan:
    name: Hadolint Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3

      - name: Run Hadolint on backend Dockerfile
        if: ${{ hashFiles('backend/Dockerfile') != '' }}
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: backend/Dockerfile
          failure-threshold: warning
          format: sarif
          output-file: backend-hadolint.sarif

      - name: Upload backend Hadolint SARIF
        if: ${{ hashFiles('backend/Dockerfile') != '' }} && github.repository_visibility == 'public'
        uses: github/codeql-action/upload-sarif@v4.33.0
        with:
          sarif_file: backend-hadolint.sarif

      - name: Run Hadolint on frontend Dockerfile
        if: ${{ hashFiles('frontend/Dockerfile') != '' }}
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: frontend/Dockerfile
          failure-threshold: warning
          format: sarif
          output-file: frontend-hadolint.sarif

      - name: Upload frontend Hadolint SARIF
        if: ${{ hashFiles('frontend/Dockerfile') != '' }} && github.repository_visibility == 'public'
        uses: github/codeql-action/upload-sarif@v4.33.0
        with:
          sarif_file: frontend-hadolint.sarif

      - name: Upload Hadolint artifact
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: hadolint-results
          path: |
            backend-hadolint.sarif
            frontend-hadolint.sarif
          if-no-files-found: ignore

  container-grype-scan:
    name: Grype Container Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3

      - name: Build backend image
        if: ${{ hashFiles('backend/Dockerfile') != '' }}
        run: docker build -f backend/Dockerfile -t blood-bank-backend:${{ github.sha }} backend

      - name: Scan backend image with Grype
        if: ${{ hashFiles('backend/Dockerfile') != '' }}
        uses: anchore/scan-action@v7.4.0
        with:
          image: blood-bank-backend:${{ github.sha }}
          fail-build: true
          severity-cutoff: high
          output-format: sarif
          output-file: backend-grype.sarif

      - name: Upload backend Grype SARIF
        if: ${{ hashFiles('backend/Dockerfile') != '' }} && github.repository_visibility == 'public'
        uses: github/codeql-action/upload-sarif@v4.33.0
        with:
          sarif_file: backend-grype.sarif

      - name: Build frontend image
        if: ${{ hashFiles('frontend/Dockerfile') != '' }}
        run: docker build -f frontend/Dockerfile -t blood-bank-frontend:${{ github.sha }} frontend

      - name: Scan frontend image with Grype
        if: ${{ hashFiles('frontend/Dockerfile') != '' }}
        uses: anchore/scan-action@v7.4.0
        with:
          image: blood-bank-frontend:${{ github.sha }}
          fail-build: true
          severity-cutoff: high
          output-format: sarif
          output-file: frontend-grype.sarif

      - name: Upload frontend Grype SARIF
        if: ${{ hashFiles('frontend/Dockerfile') != '' }} && github.repository_visibility == 'public'
        uses: github/codeql-action/upload-sarif@v4.33.0
        with:
          sarif_file: frontend-grype.sarif

      - name: Upload Grype artifact
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: grype-results
          path: |
            backend-grype.sarif
            frontend-grype.sarif
          if-no-files-found: ignore

  sonarqube-scan:
    name: SonarQube Cloud Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend for analysis context
        working-directory: frontend
        run: npm run build

      - name: Run SonarQube Cloud scan
        uses: SonarSource/sonarqube-scan-action@v8.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.projectName="blood-bank-management-system"
            -Dsonar.qualitygate.wait=true
            -Dsonar.sources=backend,frontend
            -Dsonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/*.min.js

      - name: Upload SonarQube artifact
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: sonarqube-results
          path: |
            .scannerwork/report-task.txt
            .scannerwork/scanner-report
          if-no-files-found: ignore

  test-and-coverage:
    name: Test And Coverage Status
    runs-on: ubuntu-latest
    needs:
      - ci-base
      - osv-scan
      - gitleaks-scan
      - sca-trivy-scan
      - hadolint-scan
      - container-grype-scan
      - sonarqube-scan
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Test status
        run: |
          echo "WARNING: no automated test scripts were detected in backend/package.json or frontend/package.json."
          echo "Add project test commands to enable test execution in this workflow."

      - name: Coverage status
        run: |
          echo "WARNING: no coverage measured; threshold enforcement is disabled until tests are added."
