name: Quality Gates

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "frontend/**"
      - "docker-compose.yml"
      - ".github/workflows/quality-gates.yml"
  pull_request:
    branches:
      - main
    paths:
      - "backend/**"
      - "frontend/**"
      - "docker-compose.yml"
      - ".github/workflows/quality-gates.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read
  security-events: write

jobs:
  ci-base:
    name: CI Base
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Run backend lint if present
        continue-on-error: true
        run: npm run lint --if-present
        working-directory: backend

      - name: Run frontend lint
        continue-on-error: true
        run: npm run lint -- --format json --output-file eslint-report.json
        working-directory: frontend

      - name: Build frontend
        continue-on-error: true
        run: npm run build
        working-directory: frontend

      - name: Warn about missing automated tests
        continue-on-error: true
        run: |
          echo "No automated test suite was detected in backend or frontend." > ci-no-tests.txt
          echo "Coverage threshold is set to 0 because no coverage is currently measured." >> ci-no-tests.txt
          echo "The backend test script is still the default placeholder and is intentionally not executed in CI." >> ci-no-tests.txt

      - name: Upload CI artifacts
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ci-results
          path: |
            frontend/eslint-report.json
            ci-no-tests.txt
          if-no-files-found: ignore

  dependency-osv-scan:
    name: Dependency Scan (OSV)
    needs: ci-base
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.8
    with:
      scan-args: |-
        --recursive
        ./

  secret-gitleaks-scan:
    name: Secret Scan (Gitleaks)
    needs: ci-base
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sca-trivy-scan:
    name: Trivy SCA Scan
    needs: ci-base
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3

      - name: Run Trivy filesystem report scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,license
          severity: LOW,MEDIUM,HIGH,CRITICAL
          ignore-unfixed: false
          format: sarif
          output: trivy-fs-all.sarif
          exit-code: 0

      - name: Run Trivy filesystem blocking gate
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,license
          severity: HIGH,CRITICAL
          ignore-unfixed: false
          format: sarif
          output: trivy-fs-blocking.sarif
          exit-code: 1

      - name: Upload Trivy SARIF
        if: always() && github.repository_visibility == 'public'
        uses: github/codeql-action/upload-sarif@v4.33.0
        with:
          sarif_file: trivy-fs-all.sarif
          category: trivy-fs

      - name: Upload Trivy artifacts
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: trivy-results
          path: |
            trivy-fs-all.sarif
            trivy-fs-blocking.sarif
          if-no-files-found: ignore

  container-grype-scan:
    name: Grype Container Scan
    needs: ci-base
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3

      - name: Build backend image
        run: docker build -f backend/Dockerfile -t data-cosmos-backend:${{ github.sha }} backend

      - name: Scan backend image with Grype
        uses: anchore/scan-action@v7.4.0
        with:
          image: data-cosmos-backend:${{ github.sha }}
          fail-build: true
          output-format: sarif
          output-file: backend-grype.sarif

      - name: Upload backend Grype SARIF
        if: always() && github.repository_visibility == 'public'
        uses: github/codeql-action/upload-sarif@v4.33.0
        with:
          sarif_file: backend-grype.sarif
          category: grype-backend

      - name: Upload backend Grype artifact
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: backend-grype-results
          path: backend-grype.sarif
          if-no-files-found: ignore

      - name: Build frontend image
        run: docker build -f frontend/Dockerfile -t data-cosmos-frontend:${{ github.sha }} frontend

      - name: Scan frontend image with Grype
        uses: anchore/scan-action@v7.4.0
        with:
          image: data-cosmos-frontend:${{ github.sha }}
          fail-build: true
          output-format: sarif
          output-file: frontend-grype.sarif

      - name: Upload frontend Grype SARIF
        if: always() && github.repository_visibility == 'public'
        uses: github/codeql-action/upload-sarif@v4.33.0
        with:
          sarif_file: frontend-grype.sarif
          category: grype-frontend

      - name: Upload frontend Grype artifact
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: frontend-grype-results
          path: frontend-grype.sarif
          if-no-files-found: ignore

  hadolint-scan:
    name: Hadolint Scan
    needs: ci-base
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3

      - name: Run Hadolint on backend Dockerfile
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: backend/Dockerfile
          failure-threshold: warning
          format: sarif
          output-file: backend-hadolint.sarif

      - name: Upload backend Hadolint SARIF
        if: always() && github.repository_visibility == 'public'
        uses: github/codeql-action/upload-sarif@v4.33.0
        with:
          sarif_file: backend-hadolint.sarif
          category: hadolint-backend

      - name: Upload backend Hadolint artifact
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: backend-hadolint-results
          path: backend-hadolint.sarif
          if-no-files-found: ignore

      - name: Run Hadolint on frontend Dockerfile
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: frontend/Dockerfile
          failure-threshold: warning
          format: sarif
          output-file: frontend-hadolint.sarif

      - name: Upload frontend Hadolint SARIF
        if: always() && github.repository_visibility == 'public'
        uses: github/codeql-action/upload-sarif@v4.33.0
        with:
          sarif_file: frontend-hadolint.sarif
          category: hadolint-frontend

      - name: Upload frontend Hadolint artifact
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: frontend-hadolint-results
          path: frontend-hadolint.sarif
          if-no-files-found: ignore

  sonarqube-scan:
    name: SonarQube Cloud Scan
    needs: ci-base
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Run SonarQube Cloud scan
        uses: SonarSource/sonarqube-scan-action@v8.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.projectName="blood-bank-management-system"
            -Dsonar.qualitygate.wait=true
            -Dsonar.sources=backend,frontend
            -Dsonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/*.min.js

      - name: Upload SonarQube artifact
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: sonarqube-results
          path: |
            .scannerwork/report-task.txt
            .scannerwork/*.json
            .scannerwork/*.txt
          if-no-files-found: ignore
